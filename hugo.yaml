baseURL: https://collectivedynamics.org/
languageCode: en-us
title: International Association for Collective Dynamics

enableGitInfo: true

markup:
  goldmark:
    renderer:
      unsafe: true

module:
  imports:
    - path: github.com/imfing/hextra

menu:
  main:
    - name: Board
      pageRef: /board
      weight: 1
    - name: Founding Members
      pageRef: /founding-members
      weight: 2
    - name: FAQ
      pageRef: /faq
      weight: 3
    - name: Documents
      pageRef: /documents
      weight: 4
    - name: About
      pageRef: /about
      weight: 5
    - name: Search
      weight: 6
      params:
        type: search
    - name: GitHub
      weight: 7
      url: "https://github.com/IACD-collective-dynamics"
      params:
        icon: github

params:
  navbar:
    displayTitle: true
    displayLogo: true
    logo:
      path: images/logo.png
      width: 120
      height: 60

  page:
    width: wide

  footer:
    displayCopyright: false
    displayPoweredBy: false

  displayUpdatedDate: true
  dateFormat: "January 2, 2006"
