baseURL: https://collectivedynamics.org/
languageCode: en-us
title: International Association for Collective Dynamics

enableGitInfo: true

markup:
  goldmark:
    renderer:
      unsafe: true

module:
  imports:
    - path: github.com/imfing/hextra

menu:
  main:
    - name: Board
      pageRef: /board
      weight: 2
    - name: Membership
      pageRef: /membership
      weight: 4
    - name: FAQ
      pageRef: /faq
      weight: 5
    - name: Documents
      pageRef: /documents
      weight: 6
    - name: About
      pageRef: /about
      weight: 7
    - name: Search
      weight: 8
      params:
        type: search

params:
  navbar:
    displayTitle: false
    displayLogo: true
    logo:
      path: images/logo.png
      width: 184
      height: 92

  page:
    width: wide

  theme:
    displayToggle: false

  footer:
    displayCopyright: true
    displayPoweredBy: false

  displayUpdatedDate: true
  dateFormat: "January 2, 2006"
