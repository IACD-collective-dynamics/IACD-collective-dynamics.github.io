<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
<script>
  // Assemble spam-safe email links (class="eml") from their encoded data-e part.
  document.addEventListener("DOMContentLoaded", function () {
    document.querySelectorAll("a.eml[data-e]").forEach(function (a) {
      var addr = atob(a.getAttribute("data-e"));
      a.href = "mailto:" + addr;
      if (a.querySelector(".eml-at")) a.textContent = addr;
      a.removeAttribute("data-e");
    });
  });
</script>
